---
name: Linting - Bash/Bats
permissions: {}
# Split until path filtering for jobs added
# https://github.community/t/path-filtering-for-jobs-and-steps/16447
on:
  push:
    branches: [master]
    paths:
      - "**.bash"
      - "**.bats"
  pull_request:
    branches: [master]
    paths:
      - "**.bash"
      - "**.bats"

jobs:
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write
    strategy:
      fail-fast: false
      matrix:
        extention: ["bash", "bats"]
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run shellcheck
        uses: reviewdog/action-shellcheck@4c07458293ac342d477251099501a718ae5ef86e # v1
        with:
          pattern: "*.${{ matrix.extention }}"
          exclude: "./test/bin/*"
